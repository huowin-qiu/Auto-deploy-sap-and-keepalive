name: 自动部署Chrome到SAP

on:
  workflow_dispatch:  # 手动触发
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-US(Sterling)
          - SAP-JP(Tokyo)
          # ... 其他区域保持一致
      app_name:
        description: '应用名称'
        required: false
        default: ''

env:
  # 使用 jlesage 镜像，因为它对网页端键盘输入优化得最好
  DOCKER_IMAGE: 'jlesage/chrome:latest' 
  MEMORY: '2560M'  # 严格限制在 2.5G
  DISK: '1024M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: Set Config
      run: |
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
        # 默认使用美国免费区，如有需要可在 actions 界面手动选
        echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
        if [ "${{ github.event.inputs.region }}" == "SG(free)" ]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
        fi
        echo "APP_NAME=${{ github.event.inputs.app_name || format('chrome-vnc-{0}', env.RANDOM_STR) }}" >> $GITHUB_ENV

    - name: CF Login & Deploy
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        
        # 部署并设置 Chrome 专用参数
        cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port
        
        cf set-env ${{ env.APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        cf set-env ${{ env.APP_NAME }} LANG "zh_CN.UTF-8"
        # 解决容器内 Chrome 运行的核心参数
        cf set-env ${{ env.APP_NAME }} CHROMIUM_FLAGS "--no-sandbox --disable-dev-shm-usage"
        
        cf restage ${{ env.APP_NAME }}

    - name: Success
      run: |
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "Successfully deployed Chrome at: https://$ROUTE"
