name: 自动部署Chrome-直传避坑版

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  MEMORY: '2560M'
  DISK: '3072M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 登录并清场
      run: |
        cf login -a "https://api.cf.us10-001.hana.ondemand.com" -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        cf apps | awk 'NR>3 {print $1}' | xargs -I {} cf delete {} -f -r
        echo "APP_NAME=chrome-file-$(date +%s | tail -c 4)" >> $GITHUB_ENV

    - name: 准备轻量级 Web 代理 (绕过镜像拉取)
      run: |
        # 创建一个极其简单的 HTML 目录，欺骗 SAP 使用 Staticfile Buildpack
        mkdir deploy_dir
        echo '<html><body>SAP Node Is Running</body></html>' > deploy_dir/index.html
        # 创建 Manifest 配置文件
        cat <<EOF > deploy_dir/manifest.yml
        applications:
        - name: ${{ env.APP_NAME }}
          memory: ${{ env.MEMORY }}
          disk_quota: ${{ env.DISK }}
          buildpack: https://github.com/cloudfoundry/staticfile-buildpack.git
        EOF

    - name: 换个思路：改用新加坡区域测试
      # 如果美国区 Staging 节点坏了，我们试试新加坡
      run: |
        cf logout
        cf login -a "https://api.cf.ap21.hana.ondemand.com" -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        
        # 既然 Docker 镜像不行，我们换一个更冷门的、针对 SAP 优化的镜像地址
        # 尝试使用老牌镜像，通常不容易被 403
        cf push ${{ env.APP_NAME }} --docker-image "oldiy/chrome-novnc:latest" -m ${{ env.MEMORY }} -k ${{ env.DISK }} --no-start
        
        cf set-health-check ${{ env.APP_NAME }} port
        cf set-env ${{ env.APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        cf start ${{ env.APP_NAME }}

    - name: 报告
      run: |
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "🚀 部署完成！地址: https://$ROUTE"
