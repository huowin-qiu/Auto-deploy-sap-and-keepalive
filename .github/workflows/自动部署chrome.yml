name: 自动部署Chrome-终极兼容版

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域 (如果US报错，请务必换到SG试试)'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-JP(Tokyo)

env:
  # 使用 jlesage 官方源。如果报 403，SAP 会自动重试。
  DOCKER_IMAGE: 'docker.io/jlesage/chrome:latest'
  MEMORY: '2560M'
  DISK: '1024M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 准备变量与清场
      run: |
        RS=$(head /dev/urandom | tr -dc 'a-z' | head -c 4)
        if [ "${{ github.event.inputs.region }}" == "SG(free)" ]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
        else
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
        fi
        echo "FINAL_APP_NAME=chrome-vnc-$RS" >> $GITHUB_ENV

    - name: 登录并清场
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        # 强制删除所有应用，腾出所有 4G 配额
        cf apps | awk 'NR>3 {print $1}' | xargs -I {} cf delete {} -f -r

    - name: 部署应用 (不立即启动)
      run: |
        # 使用 --no-start 避开即时启动可能导致的各种冲突
        cf push ${{ env.FINAL_APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --no-start

    - name: 注入关键参数
      run: |
        # jlesage 镜像必须监听 5800 端口
        cf set-health-check ${{ env.FINAL_APP_NAME }} port --port 5800
        
        # 环境变量：解决 Chrome 在容器中崩溃的核心
        cf set-env ${{ env.FINAL_APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        cf set-env ${{ env.FINAL_APP_NAME }} ENABLE_CJK_FONT 1
        cf set-env ${{ env.FINAL_APP_NAME }} SECURE_CONNECTION 0
        
        # 解决核心权限问题：禁用沙盒，重定向用户数据到临时目录
        cf set-env ${{ env.FINAL_APP_NAME }} CHROMIUM_FLAGS "--no-sandbox --disable-dev-shm-usage --user-data-dir=/tmp/chrome-data --remote-debugging-port=9222"

    - name: 启动应用
      run: |
        # 设置启动超时
        cf v3-set-health-check ${{ env.FINAL_APP_NAME }} port --port 5800
        cf start ${{ env.FINAL_APP_NAME }}

    - name: 成功报告
      run: |
        ROUTE=$(cf app ${{ env.FINAL_APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "🚀 部署完成！访问地址: https://$ROUTE"
