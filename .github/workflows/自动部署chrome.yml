name: 自动部署Chrome-4G极速版

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域 (建议尝试切换不同区域以避开拉取限制)'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-JP(Tokyo)
      app_name:
        description: '应用名称'
        required: false
        default: ''

env:
  # 使用官方维护的 LinuxServer 镜像，稳定性最高
  DOCKER_IMAGE: 'lscr.io/linuxserver/chrome:latest'
  MEMORY: '4096M'
  DISK: '2048M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 准备变量
      run: |
        RS=$(head /dev/urandom | tr -dc 'a-z' | head -c 4)
        if [ "${{ github.event.inputs.region }}" == "SG(free)" ]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
          DEF_NAME="chrome-4g-sg-$RS"
        else
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
          DEF_NAME="chrome-4g-us-$RS"
        fi
        
        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "FINAL_APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
        else
          echo "FINAL_APP_NAME=$DEF_NAME" >> $GITHUB_ENV
        fi

    - name: 登录并清理资源
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        
        # 强制清理旧的应用，释放 4G 空间
        cf delete ${{ env.FINAL_APP_NAME }} -f || true

    - name: 推送谷歌浏览器
      run: |
        # 使用 --no-route 可以在部署失败时更快清理，这里默认正常推送
        cf push ${{ env.FINAL_APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port

    - name: 配置浏览器环境
      run: |
        # LinuxServer 镜像专用环境变量
        cf set-env ${{ env.FINAL_APP_NAME }} TITLE "Chrome-Standard"
        cf set-env ${{ env.FINAL_APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        cf set-env ${{ env.FINAL_APP_NAME }} TZ "Asia/Shanghai"
        
        # 核心：必须禁用沙盒，否则 4G 内存也会报错
        cf set-env ${{ env.FINAL_APP_NAME }} CHROMIUM_FLAGS "--no-sandbox --disable-dev-shm-usage"
        
        cf restage ${{ env.FINAL_APP_NAME }}

    - name: 部署成功报告
      run: |
        ROUTE=$(cf app ${{ env.FINAL_APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "=================================================="
        echo "✅ 4G 内存版 Chrome 部署完成！"
        echo "访问地址: https://$ROUTE"
        echo "如果打不开，请检查 SAP BTP 控制台配额是否真的有 4G 空余。"
        echo "=================================================="
