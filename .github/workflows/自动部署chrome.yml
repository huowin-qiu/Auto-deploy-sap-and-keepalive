name: 自动部署Chrome-PaaS优化版

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-JP(Tokyo)

env:
  # 换回 jlesage，但使用 ghcr.io 镜像源绕过 Docker Hub 的 403 限制
  DOCKER_IMAGE: 'ghcr.io/jlesage/chrome:latest'
  MEMORY: '2560M'
  DISK: '1024M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 准备变量与清场
      run: |
        RS=$(head /dev/urandom | tr -dc 'a-z' | head -c 4)
        if [ "${{ github.event.inputs.region }}" == "SG(free)" ]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
        else
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
        fi
        echo "FINAL_APP_NAME=chrome-vnc-$RS" >> $GITHUB_ENV

    - name: 登录并清空所有旧应用
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        # 彻底清理
        cf apps | awk 'NR>3 {print $1}' | xargs -I {} cf delete {} -f -r

    - name: 推送并适配 jlesage 镜像
      run: |
        # jlesage 镜像默认监听 5800 端口，我们必须告诉 SAP 检查这个端口
        cf push ${{ env.FINAL_APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port -t 180
        
        # 关键：jlesage 的 Web 访问端口是 5800
        cf set-env ${{ env.FINAL_APP_NAME }} PORT 5800
        cf set-env ${{ env.FINAL_APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        
        # 禁用 Chrome 的共享内存机制，这是在 PaaS 平台运行的关键
        cf set-env ${{ env.FINAL_APP_NAME }} CHROMIUM_FLAGS "--no-sandbox --disable-dev-shm-usage --user-data-dir=/tmp/user-data"
        
        cf restage ${{ env.FINAL_APP_NAME }}

    - name: 部署报告
      run: |
        ROUTE=$(cf app ${{ env.FINAL_APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "🚀 部署完成！访问地址: https://$ROUTE"
