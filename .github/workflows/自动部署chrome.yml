name: 自动部署Chrome-GHCR源避坑版

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  # 切换到 GitHub 托管的镜像，避开 Docker Hub 封锁
  DOCKER_IMAGE: 'ghcr.io/jlesage/chrome:latest'
  MEMORY: '2560M'
  DISK: '3072M'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 登录并清场 (新加坡区)
      run: |
        cf login -a "https://api.cf.ap21.hana.ondemand.com" -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        # 强制删除所有旧应用，确保 4G 内存全额可用
        cf apps | awk 'NR>3 {print $1}' | xargs -I {} cf delete {} -f -r
        echo "APP_NAME=chrome-ghcr-$(date +%s | tail -c 4)" >> $GITHUB_ENV

    - name: 部署并对齐端口
      run: |
        cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --no-start
        
        # 强制使用 port 模式健康检查
        cf set-health-check ${{ env.APP_NAME }} port
        
        # 关键：让 GHCR 版本的镜像也监听 8080
        cf set-env ${{ env.APP_NAME }} WEB_LISTENING_PORT 8080
        cf set-env ${{ env.APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        
        # 权限与中文字体优化
        cf set-env ${{ env.APP_NAME }} ENABLE_CJK_FONT 1
        cf set-env ${{ env.APP_NAME }} CHROMIUM_FLAGS "--no-sandbox --disable-dev-shm-usage --user-data-dir=/tmp/c-data"

    - name: 启动
      run: |
        cf start ${{ env.APP_NAME }}

    - name: 报告
      run: |
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "🚀 部署完成！"
        echo "访问地址: https://$ROUTE"
