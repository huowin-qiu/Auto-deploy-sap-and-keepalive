name: 自动部署Railway到SAP

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'SG(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
      app_name:
        description: '应用名称（留空则自动生成）'
        required: false
        default: ''

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: 确定 API 和应用名
      run: |
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 4)
        
        if [ "${{ github.event.inputs.region }}" = "US(free)" ]; then
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
          echo "APP_NAME=rw-us-$RANDOM_STR" >> $GITHUB_ENV
        else
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
          echo "APP_NAME=rw-sg-$RANDOM_STR" >> $GITHUB_ENV
        fi
        
        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
        fi

    - name: 登录并清理旧应用
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        # 自动获取并进入第一个可用的 Org 和 Space
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        
        # 删除可能存在的同名应用，防止冲突
        cf delete ${{ env.APP_NAME }} -f -r || true

    - name: 部署 (冷启动逻辑)
      run: |
        # 1. 核心推送命令：直接写死镜像地址，防止变量解析错误
        cf push ${{ env.APP_NAME }} --docker-image ghcr.io/huowin-qiu/sap:1.0.0 -m 2048M -k 2048M --no-start
        
        # 2. 注入必要的环境变量 (已移除报错的 PORT 行)
        cf set-env ${{ env.APP_NAME }} LANG "zh_CN.UTF-8"
        cf set-env ${{ env.APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        
        # 3. 设置健康检查模式为 process (只要进程活着就算成功)
        cf set-health-check ${{ env.APP_NAME }} process
        
        # 4. 正式启动
        echo "正在启动 ${{ env.APP_NAME }}，请稍后..."
        if cf start ${{ env.APP_NAME }}; then
          echo "✅ 部署成功！"
        else
          echo "❌ 启动失败，正在拉取最近日志进行诊断："
          cf logs ${{ env.APP_NAME }} --recent
          exit 1
        fi

    - name: 输出部署结果
      run: |
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "🚀 部署完成！"
        echo "应用名称: ${{ env.APP_NAME }}"
        echo "访问地址: https://$ROUTE"
