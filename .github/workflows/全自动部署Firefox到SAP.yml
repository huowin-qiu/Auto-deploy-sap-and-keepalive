name: 自动部署Firefox到SAP

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'SG(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - SAP-JP(Tokyo)
  schedule:
    - cron: '0 0 * * *' # 北京时间早上 8:00 自动运行

env:
  # 强制 3G 资源配置
  DOCKER_IMAGE: 'ghcr.io/eooce/firefox:latest'
  MEMORY: '3072M'
  DISK: '3072M'

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update && sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint
      run: |
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 4)
        
        # 定时任务默认走 SG 区，手动触发走选择区
        REGION="${{ github.event.inputs.region }}"
        if [ -z "$REGION" ]; then REGION="SG(free)"; fi
        
        case "$REGION" in
          "SG(free)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=ff-sg-$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "US(free)")
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=ff-us-$RANDOM_STR" >> $GITHUB_ENV
            ;;
          *)
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=ff-auto-$RANDOM_STR" >> $GITHUB_ENV
            ;;
        esac

    - name: Login and Cleanup
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        SPACE=$(cf spaces | sed -n '4p')
        cf target -o "$ORG" -s "$SPACE"
        
        # 核心：部署前彻底清场，释放 4G 限制中的 3G 空间
        cf apps | awk 'NR>3 {print $1}' | xargs -I {} cf delete {} -f -r

    - name: Deploy application
      run: |
        # 强制使用 3G 内存和 3G 硬盘
        if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port; then
          echo "Deployment successful"
        else
          echo "伙计, 还是没资源或者镜像被封, 请检查 SAP 控制台或明天 8 点再看"
          exit 1
        fi
        
    - name: Set environment variables
      run: |
        cf set-env ${{ env.APP_NAME }} LANG "zh_CN.UTF-8"
        cf set-env ${{ env.APP_NAME }} VNC_PASSWORD "${{ secrets.VNC_PASSWORD || '123456' }}"
        # 解决某些区域 502 的端口适配
        cf set-env ${{ env.APP_NAME }} WEB_PORT 8080
        cf restage ${{ env.APP_NAME }}

    - name: Verify deployment
      run: |
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "✅ Firefox 部署完成！"
        echo "访问地址: https://$ROUTE"
